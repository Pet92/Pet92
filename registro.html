<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configura tu SmartPet ID</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Lato', sans-serif;
            background-color: #FFFBF1;
            color: #475569;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(46, 77, 104, 0.05);
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            color: #25D366;
            margin-bottom: 20px;
        }
        h2 { font-family: 'Poppins', sans-serif; color: #2E4D68; margin-bottom: 10px; }
        .subtitle { color: #64748B; margin-bottom: 30px; }
        
        /* Estilos del Formulario */
        form { text-align: left; margin-top: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 700; color: #2E4D68; margin-bottom: 8px; }
        input[type="text"], textarea, select {
            width: 100%; padding: 12px; border: 2px solid #E2E8F0; border-radius: 8px;
            font-size: 16px; font-family: 'Lato', sans-serif; outline: none;
        }
        input:focus, textarea:focus { border-color: #D1E8E2; }
        
        /* Botón de Cloudinary e Imagen */
        .btn-upload {
            display: inline-block; background-color: #D1E8E2; color: #2E4D68;
            padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700;
            cursor: pointer; margin-bottom: 15px; font-family: 'Poppins', sans-serif;
        }
        #preview-foto {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            display: none; margin: 10px 0; border: 3px solid #E2E8F0;
        }
        
        .btn-submit {
            display: block; width: 100%; background-color: #E7717D; color: white;
            padding: 16px; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif;
            font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 30px;
            box-shadow: 0 4px 14px rgba(231, 113, 125, 0.3);
        }
        .btn-submit:hover { background-color: #d65d69; }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h2>¡Gracias por tu compra!</h2>
        <p class="subtitle">Tu placa SmartPet ID va en camino. Mientras tanto, vamos a activar el perfil digital de tu mascota.</p>

        <form id="form-mascota">
            <div class="form-group">
                <label>Nombre de la Mascota *</label>
                <input type="text" id="nombre" required placeholder="Ej. Max, Camila...">
            </div>

            <div class="form-group">
                <label>Especie *</label>
                <select id="especie" required>
                    <option value="Perro">Perro</option>
                    <option value="Gato">Gato</option>
                    <option value="Otro">Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Raza</label>
                <input type="text" id="raza" placeholder="Ej. Golden Retriever, Mestizo...">
            </div>

            <div class="form-group">
                <label>Foto de tu Mascota *</label>
                <button type="button" id="upload-widget-btn" class="btn-upload">
                    <i class="fa-solid fa-camera"></i> Seleccionar Foto
                </button>
                <br>
                <img id="preview-foto" src="" alt="Vista previa">
                <input type="hidden" id="foto-url">
            </div>

            <div class="form-group">
                <label>Notas Médicas o Alergias Críticas</label>
                <textarea id="notas" rows="3" placeholder="Ej. Es diabético, requiere insulina. Es muy asustadizo con los truenos..."></textarea>
            </div>

            <div class="form-group">
                <label>Teléfono de Contacto Alternativo (Opcional)</label>
                <input type="text" id="contacto-alt" placeholder="Ej. +52 81 2233 4455">
            </div>

            <button type="submit" class="btn-submit">Guardar Perfil y Activar Placa</button>
        </form>
    </div>

    <script>
        // CONFIGURA AQUÍ TUS DATOS DE CLOUDINARY
        const CLOUD_NAME = "xsimrdtd"; 
        const UPLOAD_PRESET = "tj07fxky"; 

        // Inicializar el Widget de Carga de Cloudinary
        const myWidget = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, 
            uploadPreset: UPLOAD_PRESET,
            cropping: true, // Permite al usuario recortar la foto en círculo/cuadrado
            multiple: false, // Solo una foto por perfil
            clientAllowedFormats: ["png", "jpg", "jpeg", "webp"],
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                console.log('Imagen subida con éxito: ', result.info.secure_url);
                // 1. Guardamos la URL pública que nos da Cloudinary en el input oculto
                document.getElementById('foto-url').value = result.info.secure_url;
                // 2. Mostramos la miniatura de la foto en la pantalla
                const imgPreview = document.getElementById('preview-foto');
                imgPreview.src = result.info.secure_url;
                imgPreview.style.display = "inline-block";
            }
        });

        // Abrir el widget al hacer clic en el botón de cámara
        document.getElementById("upload-widget-btn").addEventListener("click", function(){
            myWidget.open();
        }, false);

        // Enviar todo el formulario al Backend al hacer clic en guardar
        document.getElementById('form-mascota').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fotoUrl = document.getElementById('foto-url').value;
            if(!fotoUrl) {
                alert("Por favor, sube una foto para tu mascota.");
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Preparando pasarela de pago segura...";
            submitBtn.disabled = true;

            // 1. Recuperamos el plan que el usuario seleccionó en la Landing Page
            // Si no encuentra nada, le asignamos 'basico' por defecto
            const planEnMemoria = localStorage.getItem('plan_selected') || localStorage.getItem('plan_seleccionado') || 'basico';

            // 2. Recopilamos todos los datos estructurados del formulario
            const datosPayload = {
                nombre_mascota: document.getElementById('nombre').value,
                especie: document.getElementById('especie').value,
                raza: document.getElementById('raza').value,
                foto_url: fotoUrl,
                notas_medicas: document.getElementById('notas').value,
                contacto_alternativo: document.getElementById('contacto-alt').value,
                plan: planEnMemoria,
                email_dueno: 'cliente_prueba@correo.com', // Datos simulados temporales para el webhook
                nombre_dueno: 'Cliente Prueba',
                telefono_dueno: '5511223344'
            };

            try {
                // 3. Hacemos la petición real al backend en Render
                const response = await fetch('/api/v1/registrar-pre-pago', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosPayload)
                });
                
                const data = await response.json();
                
                // 4. Si el servidor generó la sesión con éxito, redirigimos a Stripe
                if (data.url) {
                    window.location.href = data.url;
                } else {
                    alert('Error del servidor: No se pudo generar la sesión de pago.');
                    submitBtn.innerText = "Guardar Perfil y Activar Placa";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error("Error al conectar con la API:", error);
                alert("No se pudo conectar con el servidor backend para iniciar el cobro.");
                submitBtn.innerText = "Guardar Perfil y Activar Placa";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
