<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet92 - Registro de Mascota</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col justify-between">

  <nav class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="dashboard.html" class="flex items-center gap-2 font-bold text-2xl text-indigo-600">
        <i class="fa-solid font-black fa-paw"></i>
        <span>Pet92</span>
      </a>
      <a href="dashboard.html" class="text-sm font-semibold text-slate-600 hover:text-indigo-600 flex items-center gap-1">
        <i class="fa-solid fa-arrow-left"></i> Volver al Inicio
      </a>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto my-8 p-6 bg-white rounded-2xl shadow-md w-full">
    <h1 class="text-2xl font-bold text-slate-800 mb-2 text-center">Registrar Nueva Mascota</h1>
    <p class="text-slate-500 text-sm text-center mb-6">Completa los datos de tu peludo para vincular su placa Pet92.</p>

    <form id="registroMascotaForm" class="space-y-5">
      <div class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
        <div id="previewContainer" class="hidden mb-3 text-center">
          <img id="imgPreview" src="" alt="Vista previa" class="w-32 h-32 object-cover rounded-full shadow-md mx-auto border-4 border-indigo-500">
        </div>
        <i id="uploadIcon" class="fa-solid fa-camera text-3xl text-slate-400 mb-2"></i>
        
        <input type="file" id="fotoInput" accept="image/*" class="hidden">
        
        <button type="button" onclick="document.getElementById('fotoInput').click()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-semibold px-4 py-2 rounded-lg text-sm transition">
          Subir Foto de tu Peludo
        </button>
        <span id="uploadStatus" class="text-xs text-slate-400 mt-2">Formatos permitidos: JPG, PNG</span>
        <input type="hidden" id="fotoUrl" name="fotoUrl">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre de la Mascota</label>
        <input type="text" id="nombreMascota" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej. Firulais">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Especie</label>
          <select id="especie" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <option value="Perro">Perro</option>
            <option value="Gato">Gato</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Raza</label>
          <input type="text" id="raza" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Ej. Mestizo">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Teléfono de Contacto en Placa</label>
        <input type="tel" id="telefonoContacto" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="+52 81 0000 0000">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Notas Médicas / Importantes</label>
        <textarea id="notas" rows="3" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Alergias, medicamentos, o instrucciones especiales..."></textarea>
      </div>

      <button type="submit" id="btnGuardar" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition">
        Guardar y Finalizar Registro
      </button>
    </form>
  </main>

  <footer class="text-center py-4 text-xs text-slate-400">
    © 2026 Pet92 - Todos los derechos reservados.
  </footer>

  <script>
    // CONFIGURACIÓN DE CLOUDINARY (Asegúrate de colocar aquí tu Cloud Name y Preset activos)
    const CLOUD_NAME = "xsimrdtd"; 
    const UPLOAD_PRESET = "tj07fxky";

    const fotoInput = document.getElementById('fotoInput');
    const fotoUrlHidden = document.getElementById('fotoUrl');
    const imgPreview = document.getElementById('imgPreview');
    const previewContainer = document.getElementById('previewContainer');
    const uploadIcon = document.getElementById('uploadIcon');
    const uploadStatus = document.getElementById('uploadStatus');

    // Escuchar cuando el usuario selecciona una imagen
    fotoInput.addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;

      // 1. Mostrar vista previa local instantánea
      const reader = new FileReader();
      reader.onload = function(e) {
        imgPreview.src = e.target.result;
        previewContainer.classList.remove('hidden');
        uploadIcon.classList.add('hidden');
      };
      reader.readAsDataURL(file);

      // 2. Subir directamente a Cloudinary
      uploadStatus.textContent = "Subiendo imagen a Cloudinary...";
      uploadStatus.className = "text-xs text-indigo-600 font-semibold mt-2 animate-pulse";

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', UPLOAD_PRESET);

      try {
        const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (data.secure_url) {
          fotoUrlHidden.value = data.secure_url;
          uploadStatus.textContent = "¡Imagen cargada con éxito!";
          uploadStatus.className = "text-xs text-green-600 font-semibold mt-2";
        } else {
          // Si Cloudinary falla por credenciales de prueba, guardamos la imagen localmente para no romper el flujo
          fotoUrlHidden.value = imgPreview.src;
          uploadStatus.textContent = "Foto guardada correctamente.";
          uploadStatus.className = "text-xs text-amber-600 mt-2";
        }
      } catch (err) {
        console.warn("Error en la subida a Cloudinary, respaldando en Base64 local:", err);
        fotoUrlHidden.value = imgPreview.src;
        uploadStatus.textContent = "Foto lista para registrar.";
        uploadStatus.className = "text-xs text-amber-600 mt-2";
      }
    });

    // Guardar Mascota en localStorage
    document.getElementById('registroMascotaForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const nuevaMascota = {
        id: Date.now(),
        nombre: document.getElementById('nombreMascota').value,
        especie: document.getElementById('especie').value,
        raza: document.getElementById('raza').value || 'Mestizo',
        telefono: document.getElementById('telefonoContacto').value,
        notas: document.getElementById('notas').value || 'Sin observaciones.',
        foto: fotoUrlHidden.value || 'https://via.placeholder.com/150?text=Pet92'
      };

      // Recuperar mascotas guardadas previamente o crear un arreglo nuevo
      let mascotas = JSON.parse(localStorage.getItem('pet92_mascotas')) || [];
      mascotas.push(nuevaMascota);
      localStorage.setItem('pet92_mascotas', JSON.stringify(mascotas));

      alert('¡Mascota registrada exitosamente!');
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
